<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部費管理 (月別)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] { -moz-appearance: textfield; }
        input:disabled, textarea:disabled {
            background-color: #f4f5f7;
            cursor: not-allowed;
        }
        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .spinner {
            border: 4px solid #e5e7eb;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }
        .fade-out {
            opacity: 0;
            transition: opacity 0.5s ease-out;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">

    <div id="loading-screen" class="fixed inset-0 bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center z-50">
        <div class="text-center">
            <div class="spinner mx-auto mb-6"></div>
            <h2 class="text-2xl font-bold text-indigo-900 mb-2">サーバーと同期中</h2>
            <p class="text-gray-600">データを読み込んでいます...</p>
        </div>
    </div>

    <div id="app" class="p-8" style="display: none;">
        <div class="fixed top-4 right-4 z-10">
            <a href="usage.html" class="bg-white hover:bg-gray-100 text-indigo-900 font-bold py-2 px-4 rounded-full shadow-md transition flex items-center gap-2">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                使い方
            </a>
        </div>

        <div class="max-w-6xl mx-auto">
            <h1 class="text-4xl font-bold text-center text-indigo-900 mb-2">部費管理</h1>
            <p class="text-center text-sm text-gray-600 mb-4">※このサイトのデータは全員で共有されます</p>

            <div class="mb-4 max-w-xs mx-auto">
                <label for="month-selector" class="block text-sm font-medium text-gray-700 text-center mb-2">表示する月</label>
                <select id="month-selector" class="w-full px-4 py-3 border-2 border-indigo-300 rounded-lg shadow-sm focus:outline-none focus:border-indigo-500 text-lg font-bold text-indigo-900"></select>
            </div>

            <div class="text-center mb-8">
                <button id="edit-mode-button" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-6 rounded-lg shadow-md transition transform hover:scale-105 hidden">
                    過去の記録を編集
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="items-container"></div>

            <div class="text-center mb-8" id="add-item-button-container">
                <button class="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition transform hover:scale-105">
                    項目を追加
                </button>
            </div>

            <div class="bg-white rounded-lg shadow-lg py-6 pl-6 pr-1 mb-8" id="expenses-container">
                <h2 class="font-bold text-xl text-red-700 mb-4">支出</h2>
                <div id="expenses-list" class="space-y-3 mb-4"></div>
                <div class="text-center" id="add-expense-button-container">
                    <button class="w-12 h-12 bg-red-500 hover:bg-red-600 text-white font-bold rounded-full shadow-lg transition transform hover:scale-110 flex items-center justify-center mx-auto">
                        <span class="text-2xl">+</span>
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-lg shadow-lg p-8 mb-6">
                <h2 class="text-2xl font-bold text-indigo-900 mb-4">合計</h2>
                <div id="stats-list" class="mb-4"></div>
                <div class="border-t-2 border-gray-200 pt-4 mb-6">
                    <div class="flex justify-between items-center py-2">
                        <span class="text-lg font-semibold text-indigo-700">総収入:</span>
                        <span class="text-lg font-bold text-indigo-700" id="total-income">0円</span>
                    </div>
                    <div class="flex justify-between items-center py-2">
                        <span class="text-lg font-semibold text-red-600">総支出:</span>
                        <span class="text-lg font-bold text-red-600" id="total-expenses">0円</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
